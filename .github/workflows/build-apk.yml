name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake \
            libffi-dev libssl-dev liblzma-dev uuid-dev build-essential ccache

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install buildozer cython==0.29.36

      - name: Validate Python syntax
        run: python -m compileall -q .

      - name: Build debug APK
        run: |
          export JAVA_HOME="$JAVA_HOME_17_X64"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          set +e
          buildozer -v android debug 2>&1 | tee buildozer-ci.log
          status=${PIPESTATUS[0]}
          echo "BUILD_STATUS=$status" >> "$GITHUB_ENV"
          exit 0

      - name: Print failure summary
        if: env.BUILD_STATUS != '0'
        run: |
          echo "## Buildozer failure summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python - <<'PY' | tee error-summary.log >> "$GITHUB_STEP_SUMMARY"
          from pathlib import Path
          lines = Path('buildozer-ci.log').read_text(errors='replace').splitlines()
          needles = ('traceback', 'error:', 'fatal error', 'exception', 'command failed', 'failed with exit code', 'buildozer failed', 'what went wrong')
          hits = [i for i, line in enumerate(lines) if any(n in line.lower() for n in needles)]
          selected = []
          for i in hits[-12:]:
              start = max(0, i - 3)
              end = min(len(lines), i + 25)
              selected.extend(range(start, end))
          for idx in sorted(set(selected))[-260:]:
              print(f'{idx + 1}: {lines[idx]}')
          PY
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "---- last 220 log lines ----"
          tail -n 220 buildozer-ci.log
          exit 1

      - name: Upload APK
        if: env.BUILD_STATUS == '0'
        uses: actions/upload-artifact@v4
        with:
          name: TaikoMini-debug-apk
          path: bin/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-ci-log
          path: |
            buildozer-ci.log
            error-summary.log
            .buildozer/android/platform/build-*/dists/*/build.log
          if-no-files-found: ignore
