name: Build Releases

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: TaikoMini

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake \
            libffi-dev libssl-dev liblzma-dev uuid-dev build-essential ccache

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install buildozer==1.5.0 python-for-android==2024.1.21 cython==0.29.36

      - name: Validate Python syntax
        run: python -m compileall -q .

      - name: Build debug APK
        run: |
          export JAVA_HOME="$JAVA_HOME_17_X64"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          set +e
          buildozer -v android debug 2>&1 | tee buildozer-ci.log
          status=${PIPESTATUS[0]}
          echo "BUILD_STATUS=$status" >> "$GITHUB_ENV"
          exit 0

      - name: Print failure summary
        if: env.BUILD_STATUS != '0'
        run: |
          echo "## Buildozer failure summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python - <<'PY' | tee error-summary.log >> "$GITHUB_STEP_SUMMARY"
          from pathlib import Path
          lines = Path('buildozer-ci.log').read_text(errors='replace').splitlines()
          needles = ('traceback', 'error:', 'fatal error', 'exception', 'command failed', 'failed with exit code', 'buildozer failed', 'what went wrong')
          hits = [i for i, line in enumerate(lines) if any(n in line.lower() for n in needles)]
          selected = []
          for i in hits[-12:]:
              before = 220 if "ccache" in lines[i].lower() else 12
              start = max(0, i - before)
              end = min(len(lines), i + 25)
              selected.extend(range(start, end))
          for idx in sorted(set(selected))[-520:]:
              print(f'{idx + 1}: {lines[idx]}')
          PY
          if [ -s error-summary.log ]; then
            echo "::error title=Buildozer failure::$(tail -n 40 error-summary.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "---- last 220 log lines ----"
          tail -n 220 buildozer-ci.log
          exit 1

      - name: Prepare APK artifact
        if: env.BUILD_STATUS == '0'
        run: |
          mkdir -p artifacts
          cp bin/*.apk artifacts/${APP_NAME}-android-debug.apk

      - name: Upload APK
        if: env.BUILD_STATUS == '0'
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: TaikoMini-android-debug.apk
          path: artifacts/TaikoMini-android-debug.apk

      - name: Upload Android build log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: TaikoMini-android-build-log
          path: |
            buildozer-ci.log
            error-summary.log
            .buildozer/android/platform/build-*/dists/*/build.log
          if-no-files-found: ignore

  build-exe:
    name: Build EXE
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install desktop build tools
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install pygame==2.5.2 pyinstaller

      - name: Build Windows EXE
        shell: pwsh
        run: |
          @'
          import os
          import sys

          if getattr(sys, "frozen", False) and hasattr(sys, "_MEIPASS"):
              os.chdir(sys._MEIPASS)
          '@ | Set-Content -Encoding UTF8 pyinstaller_runtime_hook.py
          pyinstaller --noconfirm --onefile --windowed --name TaikoMini `
            --runtime-hook pyinstaller_runtime_hook.py `
            --add-data "lib;lib" `
            --add-data "taikomini\Resource;taikomini\Resource" `
            --add-data "taikomini\config.ini;taikomini" `
            --add-data "taikomini\config_example.ini;taikomini" `
            TaikoMini.py
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item dist\TaikoMini.exe artifacts\TaikoMini-windows.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: TaikoMini-windows.exe
          path: artifacts/TaikoMini-windows.exe

  build-dmg:
    name: Build DMG
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install desktop build tools
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install pygame==2.5.2 pyinstaller

      - name: Build macOS DMG
        run: |
          cat > pyinstaller_runtime_hook.py <<'PY'
          import os
          import sys

          if getattr(sys, "frozen", False) and hasattr(sys, "_MEIPASS"):
              os.chdir(sys._MEIPASS)
          PY
          pyinstaller --noconfirm --windowed --name TaikoMini \
            --runtime-hook pyinstaller_runtime_hook.py \
            --add-data "lib:lib" \
            --add-data "taikomini/Resource:taikomini/Resource" \
            --add-data "taikomini/config.ini:taikomini" \
            --add-data "taikomini/config_example.ini:taikomini" \
            TaikoMini.py
          mkdir -p dmg-root artifacts
          cp -R dist/TaikoMini.app dmg-root/
          hdiutil create -volname "TaikoMini" -srcfolder dmg-root -ov -format UDZO artifacts/TaikoMini-macos.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: TaikoMini-macos.dmg
          path: artifacts/TaikoMini-macos.dmg
